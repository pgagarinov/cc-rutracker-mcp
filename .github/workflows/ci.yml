# NOTE: The `coverage` job enforces ≥95% line coverage. Coverage tests land in US-008;
# until then this job will fail by design, blocking merge — that's the guardrail.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@29eef336d9b2848a0b548edc03f92a220660cdb8 # v4
      - uses: dtolnay/rust-toolchain@e18b497796c12c097a38f9edb9d0641fb99eee32 # stable
      - uses: Swatinem/rust-cache@055f5df8c3f65ea01cd41e9dc855becd88953486 # v2
      - name: cargo test
        run: cargo test --workspace --locked

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@29eef336d9b2848a0b548edc03f92a220660cdb8 # v4
      - uses: dtolnay/rust-toolchain@e18b497796c12c097a38f9edb9d0641fb99eee32 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@055f5df8c3f65ea01cd41e9dc855becd88953486 # v2
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@29eef336d9b2848a0b548edc03f92a220660cdb8 # v4
      - uses: dtolnay/rust-toolchain@e18b497796c12c097a38f9edb9d0641fb99eee32 # stable
        with:
          components: rustfmt
      - name: cargo fmt
        run: cargo fmt --all -- --check

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    env:
      # Exclusion regex — kept in sync with .cargo/llvm-cov.toml and the
      # README "Coverage" section. Edits here MUST be mirrored in both.
      #   crates/cookies-macos/src/keychain.rs  → live macOS Keychain I/O
      #   crates/mcp/src/main.rs                → stdio JSON-RPC read loop
      #   crates/cli/src/main.rs                → thin clap wrapper around cli::lib
      #   crates/cookies-macos/src/lib.rs       → macOS refresh glue (live Keychain)
      IGNORE_REGEX: 'crates/cookies-macos/src/keychain\.rs|crates/mcp/src/main\.rs|crates/cli/src/main\.rs|crates/cookies-macos/src/lib\.rs'
    steps:
      - uses: actions/checkout@29eef336d9b2848a0b548edc03f92a220660cdb8 # v4
      - uses: dtolnay/rust-toolchain@e18b497796c12c097a38f9edb9d0641fb99eee32 # stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@055f5df8c3f65ea01cd41e9dc855becd88953486 # v2
      - uses: taiki-e/install-action@34e114876b0b11c390a56381ad16ebd13914f8d5 # v2
        with:
          tool: cargo-llvm-cov
      - name: cargo llvm-cov (lcov output)
        run: cargo llvm-cov --workspace --locked --lcov --output-path lcov.info --ignore-filename-regex "$IGNORE_REGEX"
      - name: Enforce ≥95% line coverage
        run: cargo llvm-cov report --fail-under-lines 95 --ignore-filename-regex "$IGNORE_REGEX"
      - name: Upload lcov.info artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lcov-report
          path: lcov.info
          retention-days: 14
