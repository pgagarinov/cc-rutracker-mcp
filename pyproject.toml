[project]
authors = [{name = "Peter Gagarinov", email = "4868370+pgagarinov@users.noreply.github.com"}]
dependencies = [
    "mcp",
    "httpx",
    "beautifulsoup4",
    "lxml",
    "pycookiecheat",
]
name = "rutracker-mcp"
requires-python = ">= 3.11"
version = "0.1.0"

[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["osx-arm64"]

[tool.pixi.pypi-dependencies]
rutracker_mcp = { path = ".", editable = true }

[project.scripts]
rutracker-mcp = "rutracker_mcp:main"

[tool.pixi.tasks]
serve = "python -m rutracker_mcp"
